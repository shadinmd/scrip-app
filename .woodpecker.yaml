steps:
  build:
    image: reactnativecommunity/react-native-android
    environment:
      CI: "true"
      EXPO_TOKEN:
        from_secret: expo_token
      GOOGLE_SERVICES_JSON_DEV:
        from_secret: google_services_json_dev
      GOOGLE_SERVICES_JSON_PROD:
        from_secret: google_services_json_prod
    commands:
      - npm install -g eas-cli
      - npm install

      - |
        if [ "$CI_COMMIT_BRANCH" = "main" ]; then
          echo "$GOOGLE_SERVICES_JSON_PROD" | base64 -d > google-services.json
          eas build --platform android --profile production --local --non-interactive
        else
          echo "$GOOGLE_SERVICES_JSON_DEV" | base64 -d > scrip-dev-google-services.json
          eas build --platform android --profile preview --local --non-interactive
        fi

      - eas build --platform android --local --non-interactive
      - cp *.apk app.apk || cp *.aab app.aab
    when:
      event:
        - push
        - manual
      branch:
        - main
        - dev

  release:
    image: plugins/github-release
    settings:
      api_key:
        from_secret: docker_password
      files:
        - app.apk
        - app.aab
      title: "EAS Build"
    when:
      event:
        - push
        - manual
      branch:
        - main
        - dev
